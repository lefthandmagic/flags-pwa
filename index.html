<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1c24" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Flags" />
  <title>Flags</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="preconnect" href="https://flagcdn.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <main class="shell">
    <header class="top">
      <p class="brand">Flags</p>
      <div class="stats" aria-live="polite">
        <span class="lives" id="lives" title="Lives">♥♥♥</span>
        <span><em id="score">0</em> score</span>
        <span><em id="streak">0</em> streak</span>
      </div>
    </header>

    <section class="hero" id="round">
      <p class="meta" id="meta">0 / 0 seen</p>
      <p class="prompt" id="prompt">Which country is this?</p>
      <div class="flag-frame">
        <img id="flag" alt="Mystery flag" width="640" height="480" decoding="async" />
      </div>
      <div class="choices" id="choices" role="list"></div>
      <p class="feedback" id="feedback" hidden></p>
      <button type="button" class="next" id="next" hidden>Next flag</button>
    </section>

    <footer class="foot">
      <button type="button" class="ghost" id="restart">Restart</button>
      <p class="hint">3 lives · no repeat flags in a session · Add to Home Screen for the app feel</p>
    </footer>
  </main>

  <div class="overlay" id="celebrate" hidden>
    <div class="card">
      <p class="card-kicker">Streak</p>
      <h2 class="card-title" id="celebrate-title">Nice run</h2>
      <p class="card-body" id="celebrate-body"></p>
      <button type="button" class="next" id="celebrate-continue">Keep going</button>
    </div>
  </div>

  <div class="overlay" id="gameover" hidden>
    <div class="card">
      <p class="card-kicker">Game over</p>
      <h2 class="card-title">Out of lives</h2>
      <p class="card-body" id="gameover-body"></p>
      <button type="button" class="next" id="gameover-restart">Try again</button>
    </div>
  </div>

  <div class="overlay" id="cleared" hidden>
    <div class="card">
      <p class="card-kicker">Deck cleared</p>
      <h2 class="card-title">You saw every flag</h2>
      <p class="card-body" id="cleared-body"></p>
      <button type="button" class="next" id="cleared-restart">Play again</button>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }
  </script>
</body>
</html>
